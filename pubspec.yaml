name: face_attendance
description: "Mobile Attendance App with Face Recognition, Liveness Detection & Location Verification"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  geolocator: ^13.0.1
  http: ^1.2.1
  http_parser: ^4.0.2
  provider: ^6.1.2
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  intl: ^0.20.2
  image: ^4.1.7
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.3
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
